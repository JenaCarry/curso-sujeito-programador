<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Praticando Javascript</title>
    </head>
    <body>
        <main>
            <div class="numberChecker">
                <label for="numberChecker">Verificador Numérico</label>
                <input
                    type="text"
                    name="Verificador Numérico"
                    id="numberChecker"
                    placeholder="Digite um número..."
                />
                <button class="numberCheckerButton">Verificar</button>
                <p class="numberCheckerResult"></p>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
